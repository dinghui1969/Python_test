<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <title>Python程序设计章节测试系统</title>
    <style>
        *{box-sizing:border-box;font-family:微软雅黑;margin:0;padding:0;}
        body{background:#f5f7fa;padding:20px;}
        .container{max-width:1000px;margin:0 auto;background:white;padding:30px;border-radius:12px;box-shadow:0 0 10px #0000001a;}
        .title{text-align:center;color:#2c3e50;margin-bottom:20px;}
        .login-box,.chapter-box,.exam-box,.score-box,.teacher-box{display:none;margin-bottom:20px;}
        .active{display:block;}
        .form-item{margin:12px 0;}
        label{display:inline-block;width:100px;font-weight:bold;}
        input,select{padding:8px;width:280px;border:1px solid #ccc;border-radius:4px;}
        button{padding:10px 20px;background:#2d8cf0;color:white;border:none;border-radius:4px;cursor:pointer;margin:5px;}
        button:hover{background:#1b76d1;}
        .question{margin:16px 0;padding:12px;background:#f8f9fa;border-radius:6px;}
        .options{margin-left:20px;}
        .option{margin:6px 0;}
        .result{color:green;font-weight:bold;margin-top:20px;}
        .error{color:red;}
        .score-item{padding:8px;border-bottom:1px solid #eee;}
        .nav{margin-bottom:20px;}
        /* 新增：优化选项排版，避免换行导致的视觉问题 */
        .option label{width:auto;font-weight:normal;}
        .question p{margin-bottom:8px;}
    </style>
</head>
<body>
<div class="container">
    <h1 class="title">Python程序设计在线测试系统</h1>

    <!-- 登录 -->
    <div id="login" class="login-box active">
        <h2>                                  考生登录</h2>
        <div class="form-item">
            <label>姓名：</label><input type="text" id="name" required>
        </div>
        <div class="form-item">
            <label>学号：</label><input type="text" id="sid" required>
        </div>
        <div class="form-item">
            <label>班级：</label><input type="text" id="cls" required>
        </div>
        <button onclick="login()">进入考试</button>
        <button onclick="showTeacher()">教师查询</button>
    </div>

    <!-- 选章节 -->
    <div id="chapter" class="chapter-box">
        <h2>选择测试章节</h2>
        <select id="chap"></select>
        <button onclick="startExam()">开始答题</button>
        <button onclick="logout()">返回登录</button>
    </div>

    <!-- 试卷 -->
    <div id="exam" class="exam-box">
        <div class="nav">
            <span id="user-info"></span>
            <button onclick="logout()">退出登录</button>
        </div>
        <div id="paper"></div>
        <button onclick="submitExam()">交卷批阅</button>
        <div class="result" id="result"></div>
    </div>

    <!-- 教师查询 -->
    <div id="teacher" class="teacher-box">
        <h2>教师成绩查询</h2>
        <div class="form-item">
            <label>按姓名查询：</label><input type="text" id="qName">
            <button onclick="queryByName()">查询</button>
        </div>
        <div class="form-item">
            <label>按班级查询：</label><input type="text" id="qCls">
            <button onclick="queryByClass()">查询</button>
        </div>
        <div id="queryResult"></div>
        <button onclick="backLogin()">返回登录</button>
    </div>
</div>

// ====================== 全局变量 ======================
let user = null;
let currentChap = null;
let scoreData = JSON.parse(localStorage.getItem("pythonScore")) || [];

// 初始化章节列表
const chapSel = document.getElementById("chap");
Object.keys(examData).forEach((c,i) => {
    const opt = document.createElement("option");
    opt.value = c; opt.innerText = c;
    chapSel.appendChild(opt);
});

// ====================== 登录 ======================
function login(){
    const name = document.getElementById("name").value.trim();
    const sid = document.getElementById("sid").value.trim();
    const cls = document.getElementById("cls").value.trim();
    if(!name || !sid || !cls){alert("请填写完整信息");return;}
    user = {name,sid,cls};
    document.getElementById("user-info").innerText = `姓名：${name} 学号：${sid} 班级：${cls}`;
    show("chapter");
}

// ====================== 切换界面 ======================
function show(id){
    document.querySelectorAll(".login-box,.chapter-box,.exam-box,.teacher-box")
        .forEach(e=>e.classList.remove("active"));
    document.getElementById(id).classList.add("active");
}

function logout(){user=null;show("login");}
function showTeacher(){show("teacher");}
function backLogin(){show("login");}

// ====================== 开始考试 ======================
function startExam(){
    currentChap = chapSel.value;
    const data = examData[currentChap];
    const html = [];
    html.push(`<h3>${currentChap} 测试题</h3>`);

    // 单选（重构选项生成逻辑，避免排版问题）
    html.push("<h4>一、单选题（每题5分）</h4>");
    data.single.forEach((q,i)=>{
        html.push(`<div class="question">`);
        html.push(`<p>${i+1}. ${q.q}</p><div class="options">`);
        // 循环生成选项，自动添加A/B/C/D前缀
        q.opt.forEach((opt,j)=>{
            const optLetter = "ABCD"[j];
            html.push(`<div class="option">
                <label>
                    <input type="radio" name="s${i}" value="${optLetter}" data-opt="${opt}"> 
                    ${optLetter}. ${opt}
                </label>
            </div>`);
        });
        html.push(`</div></div>`);
    });

    // 填空
    html.push("<h4>二、填空题（每题5分）</h4>");
    data.blank.forEach((q,i)=>{
        html.push(`<div class="question"><p>${i+1}. ${q.q}</p>`);
        html.push(`<input type="text" name="b${i}" placeholder="请输入答案"></div>`);
    });

    // 编程
    html.push("<h4>三、编程题（每题25分）</h4>");
    data.code.forEach((q,i)=>{
        html.push(`<div class="question"><p>${i+1}. ${q.q}</p>`);
        html.push(`<textarea name="c${i}" rows="4" cols="80" placeholder="请输入代码"></textarea></div>`);
    });

    document.getElementById("paper").innerHTML = html.join("");
    document.getElementById("result").innerHTML = "";
    show("exam");
}

// ====================== 交卷批阅（核心修复）======================
function submitExam(){
    const data = examData[currentChap];
    let score = 0;
    const ans = [];

    // 单选批阅（修复识别逻辑 + 增加错误原因）
    data.single.forEach((q,i)=>{
        // 获取选中的单选按钮
        const selectedRadio = document.querySelector(`input[name="s${i}"]:checked`);
        const selectedValue = selectedRadio?.value;
        const selectedOpt = selectedRadio?.dataset.opt || "未作答";
        
        // 获取正确选项的文本
        const correctOptIndex = "ABCD".indexOf(q.a);
        const correctOptText = q.opt[correctOptIndex] || "";

        if(selectedValue === q.a){
            score +=5; 
            ans.push(`<span style="color:green">单选${i+1}: 正确</span>`);
        } else {
            // 详细的错误原因
            let errorReason = "";
            if(selectedValue === undefined){
                errorReason = "未选择答案";
            } else {
                errorReason = `选择了${selectedValue}.${selectedOpt}，正确答案应为${q.a}.${correctOptText}`;
            }
            ans.push(`<span style="color:red">单选${i+1}: 错误 - ${errorReason}</span>`);
        }
    });

    // 填空批阅（增加错误原因）
    data.blank.forEach((q,i)=>{
        const userAnswer = document.querySelector(`input[name="b${i}"]`).value.trim();
        
        if(userAnswer === q.a){
            score +=5; 
            ans.push(`<span style="color:green">填空${i+1}: 正确</span>`);
        } else {
            let errorReason = "";
            if(userAnswer === ""){
                errorReason = "未填写答案";
            } else {
                errorReason = `填写了"${userAnswer}"，正确答案应为"${q.a}"`;
            }
            ans.push(`<span style="color:red">填空${i+1}: 错误 - ${errorReason}</span>`);
        }
    });

    // 编程批阅（优化关键词匹配 + 增加错误原因）
    data.code.forEach((q,i)=>{
        const userCode = document.querySelector(`textarea[name="c${i}"]`).value.trim();
        // 标准化答案和用户输入（去除无关符号）
        const standardAnswer = q.a.replace(/print|\(|\)|;| |\n/g,"").toLowerCase();
        const standardUserCode = userCode.replace(/print|\(|\)|;| |\n/g,"").toLowerCase();

        if(standardUserCode.includes(standardAnswer)){
            score +=25; 
            ans.push(`<span style="color:green">编程${i+1}: 正确</span>`);
        } else {
            let errorReason = "";
            if(userCode === ""){
                errorReason = "未编写代码";
            } else {
                errorReason = `代码不符合要求，参考答案：${q.a}`;
            }
            ans.push(`<span style="color:red">编程${i+1}: 错误 - ${errorReason}</span>`);
        }
    });

    // 保存成绩
    const record = {
        ...user, chap:currentChap, score, time:new Date().toLocaleString()
    };
    scoreData.push(record);
    localStorage.setItem("pythonScore", JSON.stringify(scoreData));

    // 显示结果（优化排版）
    document.getElementById("result").innerHTML = `
        <p style="font-size:18px;margin-bottom:10px;">最终得分：${score} / 100</p>
        <p style="font-weight:bold;margin-bottom:8px;">批阅详情：</p>
        <div style="line-height:1.8;">${ans.join("<br>")}</div>
    `;
}

// ====================== 教师查询 ======================
function queryByName(){
    const name = document.getElementById("qName").value.trim();
    const list = scoreData.filter(s=>s.name === name);
    showResult(list);
}
function queryByClass(){
    const cls = document.getElementById("qCls").value.trim();
    const list = scoreData.filter(s=>s.cls === cls);
    showResult(list);
}
function showResult(list){
    if(list.length===0){
        document.getElementById("queryResult").innerHTML="<p style='color:red;'>无匹配成绩记录</p>";
        return;
    }
    let html = `<p style="margin-bottom:10px;">共 ${list.length} 条匹配记录</p>`;
    list.forEach(item=>{
        html += `<div class="score-item">
            ${item.time}｜${item.cls}｜${item.name}(${item.sid})｜${item.chap}｜<strong>${item.score}分</strong>
        </div>`;
    });
    document.getElementById("queryResult").innerHTML = html;
}
</script>
